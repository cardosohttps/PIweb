<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Hacker - Personalize o seu perfil</title>
    <link rel="stylesheet" href="TelaPerfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <i class="fa-solid fa-clock logo-icon"></i>
            <h1 class="logo-text">ROUTINE HACKER</h1>
        </div>
        <button class="menu-btn"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <main class="main-content">
        <div class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Voltar
        </div>

        <h2 class="page-title">Personalize o seu perfil</h2>

        <div class="profile-container">
            <div class="left-column">
                <div class="current-user-info">
                    <div class="avatar-wrapper">
                        <div class="main-avatar">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="edit-icon">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                    </div>
                    <div class="user-details">
                        <span class="user-name">Yasmin Lima Eger</span>
                        <span class="user-email">yasmin@gmail.com</span>
                    </div>
                </div>

                <hr class="divider">

                <div class="avatar-selection-grid">
                    <img src="1.png" alt="Avatar 1" class="avatar-option">
                    <img src="20.png" alt="Avatar 2" class="avatar-option">
                    <img src="18.png" alt="Avatar 3" class="avatar-option">
                    <img src="26.png" alt="Avatar 4" class="avatar-option">
                    <img src="3.png" alt="Avatar 5" class="avatar-option">
                    <img src="13.png" alt="Avatar 6" class="avatar-option">
                </div>

                <hr class="divider">
            </div>

            <div class="right-column">
                <form class="profile-form" action="#" method="POST">
                    <div class="input-group">
                        <input type="text" id="telefone" placeholder="Telefone:">
                    </div>
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username:">
                    </div>
                    <div class="input-group">
                        <input type="text" id="compromissos" placeholder="Compromissos:">
                    </div>
                    <div class="input-group">
                        <input type="text" id="biografia" placeholder="Biografia:">
                    </div>
                    <div class="input-group">
                        <input type="text" id="curso" placeholder="Curso:">
                    </div>
                </form>
            </div>
        </div>

        <div class="action-container">
            <button type="button" class="action-btn">
                <i class="fa-solid fa-star"></i> Alterar
            </button>
        </div>
    </main>
</body>
</html>
