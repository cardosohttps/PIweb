<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routine Hacker - Cadastro</title>
    <link rel="stylesheet" href="TelaCadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <i class="fa-solid fa-clock logo-icon"></i>
        <h1 class="logo-text">ROUTINE HACKER</h1>
      </div>
      <button class="menu-btn"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <main class="main-content">
      <div class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar</div>

      <div class="register-container">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <h2 class="register-title">Faça seu cadastro</h2>

        <form class="register-form" action="#" method="POST">
          <div class="input-group">
            <input type="text" id="nome" placeholder="Nome:" required />
          </div>
          <div class="input-group">
            <input
              type="text"
              id="matricula"
              placeholder="Matrícula:"
              required
            />
          </div>
          <div class="input-group">
            <input
              type="password"
              id="senha"
              placeholder="Crie uma senha:"
              required
            />
          </div>
          <button type="submit" class="register-btn">
            <i class="fa-solid fa-star"></i> Cadastrar
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
