<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routine Hacker - Login</title>
    <link rel="stylesheet" href="TelaLogin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="logo-container">
        <i class="fa-solid fa-clock logo-icon"></i>
        <h1 class="logo-text">ROUTINE HACKER</h1>
      </div>
      <button class="menu-btn"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <main class="main-content">
      <div class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar</div>

      <div class="login-container">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <h2 class="login-title">Login</h2>

        <form class="login-form" action="#" method="POST">
          <div class="input-group">
            <input
              type="text"
              id="matricula"
              placeholder="Matrícula:"
              required
            />
          </div>
          <div class="input-group">
            <input
              type="password"
              id="senha"
              placeholder="Digite sua senha:"
              required
            />
          </div>
          <button type="submit" class="login-btn">
            <i class="fa-solid fa-circle-play"></i> Logar
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
