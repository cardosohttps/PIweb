<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Hacker - Compromissos</title>
    <link rel="stylesheet" href="TelaCalendario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <i class="fa-solid fa-clock logo-icon"></i>
            <h1 class="logo-text">ROUTINE HACKER</h1>
        </div>
        <button class="menu-btn"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <main class="main-content">
        <div class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Voltar
        </div>

        <div class="center-container">
            <div class="calendar-card">
                <p class="calendar-subtitle">Escolha a data dos seus compromissos</p>
                
                <div class="calendar-header-main">
                    <h2 class="current-date-large">Aug 17</h2>
                    <i class="fa-solid fa-pen edit-icon"></i>
                </div>

                <div class="calendar-nav">
                    <span class="month-year">Agosto 2025 <i class="fa-solid fa-caret-down"></i></span>
                    <div class="nav-arrows">
                        <i class="fa-solid fa-chevron-left"></i>
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>

                <div class="calendar-grid">
                    <div class="weekday">S</div>
                    <div class="weekday">M</div>
                    <div class="weekday">T</div>
                    <div class="weekday">W</div>
                    <div class="weekday">T</div>
                    <div class="weekday">F</div>
                    <div class="weekday">S</div>

                    <div></div><div></div><div></div><div></div><div></div>
                    
                    <div class="day">1</div>
                    <div class="day">2</div>
                    <div class="day">3</div>
                    <div class="day">4</div>
                    <div class="day outlined">5</div>
                    <div class="day">6</div>
                    <div class="day">7</div>
                    <div class="day">8</div>
                    <div class="day">9</div>
                    <div class="day">10</div>
                    <div class="day">11</div>
                    <div class="day">12</div>
                    <div class="day">13</div>
                    <div class="day">14</div>
                    <div class="day">15</div>
                    <div class="day">16</div>
                    <div class="day selected">17</div>
                    <div class="day">18</div>
                    <div class="day">19</div>
                    <div class="day">20</div>
                    <div class="day">21</div>
                    <div class="day">22</div>
                    <div class="day">23</div>
                    <div class="day">24</div>
                    <div class="day">25</div>
                    <div class="day">26</div>
                    <div class="day">27</div>
                    <div class="day">28</div>
                    <div class="day">29</div>
                    <div class="day">30</div>
                    <div class="day">31</div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" placeholder="Descrição:">
            </div>

            <div class="action-buttons">
                <button type="button" class="action-btn">
                    <i class="fa-solid fa-star"></i> Excluir
                </button>
                <button type="button" class="action-btn">
                    <i class="fa-solid fa-star"></i> Marcar
                </button>
            </div>
        </div>

        <div class="notification-card">
            <h3 class="notif-title">Notificação de<br>compromisso</h3>
            <p class="notif-text">Você tem tal compromisso marcado<br>para o dia 17 de Agosto.</p>
            <div class="notif-actions">
                <span class="notif-link">Ver calendário</span>
                <span class="notif-link">Ignorar</span>
            </div>
        </div>

    </main>
</body>
</html>
