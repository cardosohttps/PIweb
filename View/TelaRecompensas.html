<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Hacker - Recompensas</title>
    <link rel="stylesheet" href="TelaRecompensas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <i class="fa-solid fa-clock logo-icon"></i>
            <h1 class="logo-text">ROUTINE HACKER</h1>
        </div>
        <button class="menu-btn"><i class="fa-solid fa-ellipsis"></i></button>
    </header>

    <main class="main-content">
        <div class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Voltar
        </div>

        <h2 class="page-title">Recompensas</h2>

        <div class="rewards-container">
            <div class="reward-card level-1">
                <span class="reward-date">27/11</span>
                <span class="reward-name">Modo Foco Pro</span>
                <div class="medal-icon">
                    <i class="fa-solid fa-medal"></i>
                </div>
            </div>

            <div class="reward-card level-2">
                <span class="reward-date">15/11</span>
                <span class="reward-name">Estudocrata</span>
                <div class="medal-icon">
                    <i class="fa-solid fa-medal"></i>
                </div>
            </div>

            <div class="reward-card level-3">
                <span class="reward-date">13/11</span>
                <span class="reward-name">Imparável</span>
                <div class="medal-icon">
                    <i class="fa-solid fa-medal"></i>
                </div>
            </div>

            <div class="reward-card level-4">
                <span class="reward-date">12/11</span>
                <span class="reward-name">Prodígio</span>
                <div class="medal-icon">
                    <i class="fa-solid fa-medal"></i>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
